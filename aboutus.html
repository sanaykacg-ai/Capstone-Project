<!DOCTYPE html>
<html>

<head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"

    <title>Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #333;
        }

        .topnav a {
            float: left;
            color: #1affa3;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav a.active {
            background-color: #ffe066;
            color: black;
        }
    </style>
</head>

<body>
    <div class="topnav">
        <a href="home.html">Home</a>
        <a class="active" href="aboutus.html">About Us</a>
        <a href="gallery.html">Gallery</a>
        <a href="contactus.html">Contact Us</a>
    </div>
    <div class="container">
        <div id="c" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#c" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#c" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#c" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <center>
                        <img src="https://www.publicdomainpictures.net/pictures/90000/nahled/space-galaxy-1401467040F0s.jpg" alt="pic" class="d-block w-100"/>
                    </center>
                </div>
                <div class="carousel-item">
                    <center>
                        <img src="https://t4.ftcdn.net/jpg/02/12/54/23/360_F_212542340_YIjA1d4VbAsLCTDhEYAp0zTwt1cjdzB1.jpg" alt="pic" class="d-block w-100"/>
                    </center>
                </div>
                <div class="carousel-item">
                    <center>

                    </center>
                </div>
            </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#c" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#c" data-bs-slide="next">
