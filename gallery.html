<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">

        <center>Gallery:</center>
    </span><br>
    <title>Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #333;
        }

        .topnav a {
            float: left;
            color: #1affa3;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav a.active {
            background-color: #ffe066;
            color: black;
        }
    </style>
</head>

<body>
    <div class="topnav">
        <a href="home.html">Home</a>
        <a href="aboutus.html">About Us</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="contactus.html">Contact Us</a>
    </div>
    <section>
        <img class="mySlides"
            src="https://www.nhm.ac.uk/content/dam/nhm-www/discover/what-is-space/what-is-space-milky-way-full-width.jpg"
            style="height:500px;">
        <img class="mySlides" src="https://cdn.mos.cms.futurecdn.net/HuGGeENt6kGyixe3hT9tnY.jpg" style="height:500px;">
        <img class="mySlides" src="https://cdn.hswstatic.com/gif/outer-space.jpg" style="height:500px;">
    </section>
    <script>
        var myIndex = 0;
        carousel();
        function carousel() {
            var i;
            var x = document.getElementsByClassName("mySlides");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            myIndex++;
            if (myIndex > x.length) { myIndex = 1 }
            x[myIndex - 1].style.display = "block";
            setTimeout(carousel, 3000);
        }
    </script>
    <section class="section section-dark">
        <h2>Section One</h2>
        <p>Pictures from us.</p>
    </section>
    <div class="pimg6">
        <div class="ptext">
            <span class="border trans">Image One Text</span>
        </div>
    </div>
    <section class="section section-dark">
        <h2>Section Two</h2>
        <p>More pictures from us.</p>
    </section>
    <div class="pimg7">
        <div class="ptext">
            <span class="border trans">Image Two Text</span>
        </div>
    </div>
    <section class="section section-dark">
        <h2>Section Three</h2>
        <p>Even more pictures from us.</p>
    </section>
    <div class="pimg8">
        <div class="ptext">
            <span class="border trans">Image Three Text</span>
        </div>
    </div>
</body>

</html>
